body:
  text: 唐開元三朝灌頂國師和尚三藏沙門不空奉詔譯曩謨引囉怛曩二合一怛囉二合夜引野二曩引莫阿上哩也二合引三嚩路枳帝引濕嚩二合囉野引四地引怛嚩二合野五摩引賀引怛嚩二合野六摩賀迦嚕抳尼貞反迦引野七唵引八嚩婆去曳數去九怛囉二合引拏上引迦囉野十怛寫銘十一曩莫入塞訖哩三合怛嚩二合十二伊上𤚥無敢反阿去哩也二合十三嚩路枳帝引濕嚩二合囉引十四怛嚩二合𩕳上攞建姹十三曩上麼𠶹哩二合娜野十六麼襪轉舌呼之跢十七伊上灑引弭也二合十八嚩引囉他去娑去馱喃上十九輸入伴蒲憾反阿上喏琰二合二十嚩部引哆引喃引上二十一婆去嚩引沫轉舌呼之𭌇誐二十二尾戍引上馱劒平二十三怛你也二合他去二十四唵引二十五阿去路計阿去引路迦二十六摩底路迦底丁以反二十七訖囒二合帝引二十八呬呬入賀𭋸引二十九摩賀引地引怛嚩二合三十娑麼二合囉引娑麼二合囉三十一𠶹哩二合娜野三十二矩嚕矩嚕羯𤚥引三十三娑達野娑達野三十四度嚕度嚕三十五尾演底三十六摩賀尾演底三十七馱囉馱囉三十八達引捺𭋸二合引濕嚩二合囉引三十九左攞左攞引四十尾摩攞阿上摩攞引四十一哩帝二合四十二伊上𨢘曳二合呬入四十三路枳濕嚩二合囉四十四囉誐尾灑四十五尾曩捨野四十六你吠二合灑尾灑四十七尾曩引捨野四十八慕賀引左囉引尾灑四十九尾曩引捨野五十護嚕護嚕五十一麼攞護嚕五十二賀𭋸引鉢娜麼二合曩婆去五十三娑囉娑囉引五十四悉哩悉哩五十五素嚕素嚕五十六沒地也二合引沒地也二合引五十七引馱野引馱野引五十八昧帝𭋸二合曳五十九𩕳引攞建姹勑賈反六十迦麼寫引那捺哩捨二合喃上引六十一鉢囉二合賀攞二合娜野引六十二摩諾引六十三娑嚩二合賀引六十四悉馱引野六十五娑嚩二合賀引六十六摩賀引悉馱野六十七娑嚩二合賀引六十八悉馱引喻擬去濕嚩二合囉野引六十九娑嚩引賀引七十𩕳攞引建姹引同上野引七十一娑嚩二合賀引七十二嚩囉引賀上穆引佉去七十三僧思孕反賀目佉野七十四娑嚩二合賀引七十五鉢上娜麼二合賀引娑哆二合野七十六娑嚩二合賀引七十七作羯囉二合庾引馱引野七十八娑嚩二合賀引七十九商佉去捨入嚩娜二合𩕳引八十引達曩引野八十一娑嚩二合賀引八十二摩賀引攞矩吒馱引囉野八十三娑嚩二合賀引八十四嚩麼娑謇二合馱八十五泥以反捨悉體二合跢入八十六訖哩二合瑟拏二合喏茲以反曩引野八十七娑嚩二合賀引八十八尾野二合引伽囉二合拶麼引八十九𩕳嚩娑曩引野九十娑嚩二合賀引九十一曩謨囉怛曩二合九十二怛囉二合夜野引九十三曩莫入阿去哩也二合九十四嚩路引枳帝濕嚩二合引囉引野引九十五娑嚩二合賀引九十六有鐶子是虛聲
